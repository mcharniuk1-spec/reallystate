# PostGIS image tags vary by CPU architecture. `postgis/postgis:17-3.5` may lack linux/arm64
# manifests on some hosts (Apple Silicon). Prefer a multi-arch tag such as 16-3.4, or set:
#   export DOCKER_DEFAULT_PLATFORM=linux/amd64
# before `docker compose up` if you must run an amd64-only image via emulation.
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: bgrealestate-postgres
    environment:
      POSTGRES_USER: bgrealestate
      POSTGRES_PASSWORD: bgrealestate
      POSTGRES_DB: bgrealestate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgrealestate -d bgrealestate"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bgrealestate-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: bgrealestate-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # MinIO images do not reliably ship the `mc` client. Use the built-in health endpoint instead.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.27
    container_name: bgrealestate-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: bgrealestate
      POSTGRES_PWD: bgrealestate
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: bgrealestate-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  minio_data:
