[alembic]
script_location = migrations
prepend_sys_path = .
timezone = UTC

# The real URL is read from DATABASE_URL in migrations/env.py.
# This placeholder keeps Alembic CLI tools happy before local secrets are configured.
sqlalchemy.url = postgresql+psycopg://bgrealestate:bgrealestate@localhost:5432/bgrealestate

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
